name: Mirror to Production

on:
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staging
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to production
        env:
          PAT: ${{ secrets.PRODUCTION_REPO_PAT }}
        run: |
          # A real git push transfers the commit objects; the refs REST API
          # cannot (it 422s with "Object does not exist" for any commit not
          # already in the target repo). --force keeps mirror semantics:
          # staging is the source of truth.
          git push --force "https://x-access-token:${PAT}@github.com/vibesyemmy/portfolio.git" HEAD:main
          echo "Production synced to $(git rev-parse HEAD)"
