name: Mirror to Production

on:
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify PAT
        env:
          PAT: ${{ secrets.PRODUCTION_REPO_PAT }}
        run: |
          if [ -z "$PAT" ]; then
            echo "ERROR: PRODUCTION_REPO_PAT is empty"
            exit 1
          fi
          echo "PAT length: ${#PAT} chars"

          # Test REST API (read)
          HTTP=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer $PAT" \
            "https://api.github.com/repos/vibesyemmy/portfolio")
          echo "REST API: HTTP $HTTP"

          # Test git ls-remote (git-level auth)
          GIT_OUT=$(git ls-remote "https://x-access-token:${PAT}@github.com/vibesyemmy/portfolio.git" HEAD 2>&1)
          GIT_EXIT=$?
          echo "git ls-remote exit: $GIT_EXIT"
          echo "git ls-remote output: $GIT_OUT"

          if [ $GIT_EXIT -ne 0 ]; then
            echo "ERROR: PAT rejected by git — check token permissions"
            exit 1
          fi

      - name: Mirror
        env:
          PAT: ${{ secrets.PRODUCTION_REPO_PAT }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone production, pull from staging checkout, push back
          git clone --bare "https://x-access-token:${PAT}@github.com/vibesyemmy/portfolio.git" /tmp/production.git
          cd /tmp/production.git
          git fetch "$GITHUB_WORKSPACE" main:main --force
          git push origin main --force
