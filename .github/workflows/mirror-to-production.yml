name: Mirror to Production

on:
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staging
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get staging HEAD SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Sync via GitHub API
        env:
          PAT: ${{ secrets.PRODUCTION_REPO_PAT }}
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          # Update production's main ref to match staging's HEAD
          RESPONSE=$(curl -s -w '\n%{http_code}' -X PATCH \
            -H "Authorization: Bearer ${PAT}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -d "{\"sha\":\"${SHA}\",\"force\":true}" \
            "https://api.github.com/repos/vibesyemmy/portfolio/git/refs/heads/main")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: $BODY"
            exit 1
          fi
          echo "Production synced to $SHA"
