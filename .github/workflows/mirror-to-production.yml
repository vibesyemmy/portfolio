name: Mirror to Production

on:
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staging
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror push
        env:
          PAT: ${{ secrets.PRODUCTION_REPO_PAT }}
        run: |
          echo "PAT length: ${#PAT}"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Use git push directly with credential in remote URL
          git push --force "https://x-access-token:${PAT}@github.com/vibesyemmy/portfolio.git" HEAD:main
