name: Mirror to Production

on:
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to production
        env:
          PAT: ${{ secrets.PRODUCTION_REPO_PAT }}
        run: |
          git remote add production https://github.com/vibesyemmy/portfolio.git
          git -c credential.helper='!f() { echo "username=x-access-token"; echo "password=$PAT"; }; f' push production main
